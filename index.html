<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#05080f">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<title>WE ARE LEGION — a Bobiverse-inspired game</title>
<style>
:root{
  --bg:#05080f; --panel:#0c1320; --panel2:#101a2c; --line:#1d2c47;
  --txt:#d4e6f2; --dim:#7b93ad; --acc:#4be1c3; --acc2:#39b4ff;
  --warn:#ffb454; --bad:#ff5d6c; --good:#6ee07a;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:manipulation}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:15px}
#app{position:fixed;inset:0;display:flex;flex-direction:column}
#top{padding:calc(env(safe-area-inset-top) + 6px) 10px 6px;display:flex;align-items:center;gap:8px;
  background:#070b14;border-bottom:1px solid var(--line);flex-wrap:wrap}
.res{font-variant-numeric:tabular-nums;font-size:13px;color:var(--dim);background:var(--panel);
  border:1px solid var(--line);border-radius:8px;padding:4px 8px;white-space:nowrap}
.res b{color:var(--txt);font-weight:600}
#bobchip{margin-left:auto;background:rgba(75,225,195,.12);border:1px solid rgba(75,225,195,.4);
  color:var(--acc);border-radius:8px;padding:4px 10px;font-size:13px;font-weight:600}
.icobtn{background:var(--panel);border:1px solid var(--line);color:var(--dim);border-radius:8px;
  padding:4px 9px;font-size:14px}
#main{flex:1;position:relative;overflow:hidden}
.view{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;display:none}
.view.on{display:block}
#view-map{padding:0;overflow:hidden}
#map{display:block;width:100%;height:100%}
#starcard{position:absolute;left:10px;right:10px;bottom:10px;background:rgba(12,19,32,.95);
  border:1px solid var(--line);border-radius:14px;padding:12px;display:none;backdrop-filter:blur(6px)}
#starcard.on{display:block}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.chip{font-size:12px;padding:3px 8px;border-radius:99px;border:1px solid var(--line);color:var(--dim);background:var(--panel)}
.chip.good{color:var(--good);border-color:rgba(110,224,122,.4)}
.chip.bad{color:var(--bad);border-color:rgba(255,93,108,.4)}
.chip.warn{color:var(--warn);border-color:rgba(255,180,84,.4)}
.chip.acc{color:var(--acc);border-color:rgba(75,225,195,.4)}
.chip.blue{color:var(--acc2);border-color:rgba(57,180,255,.4)}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}
h2{font-size:16px;margin:0 0 4px;letter-spacing:.04em}
h3{font-size:13px;margin:14px 0 6px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em}
.sub{color:var(--dim);font-size:13px;line-height:1.45}
.btn{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;min-height:50px;
  margin-top:8px;padding:10px 12px;border-radius:12px;border:1px solid rgba(75,225,195,.45);
  background:rgba(75,225,195,.1);color:var(--acc);font-size:15px;font-weight:600;text-align:center;line-height:1.3}
.btn:active{background:rgba(75,225,195,.25)}
.btn.bad{border-color:rgba(255,93,108,.5);background:rgba(255,93,108,.1);color:var(--bad)}
.btn.bad:active{background:rgba(255,93,108,.25)}
.btn.dim{border-color:var(--line);background:var(--panel2);color:var(--dim)}
.btn.blue{border-color:rgba(57,180,255,.5);background:rgba(57,180,255,.1);color:var(--acc2)}
.btn[disabled]{opacity:.4;pointer-events:none}
.bsub{font-size:12px;font-weight:400;color:var(--dim);margin-top:2px}
.row{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--line);
  border-radius:12px;background:var(--panel2);margin-top:8px}
.row .grow{flex:1;min-width:0}
.row .t1{font-size:14px;font-weight:600}
.row .t2{font-size:12px;color:var(--dim);margin-top:2px;line-height:1.35}
.minibtn{border:1px solid rgba(75,225,195,.45);background:rgba(75,225,195,.1);color:var(--acc);
  border-radius:10px;padding:9px 12px;font-size:13px;font-weight:600;white-space:nowrap}
.minibtn[disabled]{opacity:.4;pointer-events:none}
.ordrow{display:flex;gap:4px;margin-top:8px}
.ordbtn{flex:1;font-size:10px;padding:6px 0;border-radius:8px;border:1px solid var(--line);
  background:var(--panel);color:var(--dim);letter-spacing:.05em;font-weight:600}
.ordbtn.on{border-color:rgba(75,225,195,.5);color:var(--acc);background:rgba(75,225,195,.08)}
.bar{height:7px;border-radius:4px;background:#0a101c;border:1px solid var(--line);overflow:hidden;margin-top:5px}
.bar i{display:block;height:100%;background:var(--acc);transition:width .4s}
.bar.red i{background:var(--bad)}
.bar.org i{background:var(--warn)}
#tabs{display:flex;border-top:1px solid var(--line);background:#070b14;
  padding-bottom:max(env(safe-area-inset-bottom),8px)}
.tab{flex:1;padding:10px 0 6px;text-align:center;color:var(--dim);font-size:10px;letter-spacing:.06em;border:none;background:none}
.tab span{display:block;font-size:18px;margin-bottom:2px;filter:grayscale(1) opacity(.6)}
.tab.on{color:var(--acc)}
.tab.on span{filter:none}
#modal{position:fixed;inset:0;background:rgba(2,5,10,.8);display:none;align-items:flex-end;
  justify-content:center;z-index:50;backdrop-filter:blur(4px)}
#modal.on{display:flex}
#modalbox{width:100%;max-width:480px;max-height:82%;overflow-y:auto;-webkit-overflow-scrolling:touch;
  background:var(--panel);border:1px solid var(--line);border-radius:18px 18px 0 0;
  padding:18px 16px calc(env(safe-area-inset-bottom) + 16px)}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}80%{transform:translateX(3px)}}
#modalbox.shake{animation:shake .3s}
.mtitle{font-size:17px;font-weight:700;letter-spacing:.05em;color:var(--acc);margin-bottom:8px}
.mtitle.bad{color:var(--bad)}
.mtitle.blue{color:var(--acc2)}
.mbody{font-size:14px;line-height:1.55;color:var(--txt)}
.mbody .g{color:var(--acc2);font-family:ui-monospace,Menlo,monospace;font-size:13px}
.logline{font-size:13px;line-height:1.5;padding:7px 0;border-bottom:1px solid #101827;color:var(--dim)}
.logline b{color:var(--txt)}
.logline.acc{color:var(--acc)}
.logline.bad{color:var(--bad)}
.logline.good{color:var(--good)}
.logline.blue{color:var(--acc2)}
#toast{position:fixed;top:calc(env(safe-area-inset-top) + 54px);left:50%;transform:translateX(-50%) translateY(-8px);
  background:rgba(12,19,32,.97);border:1px solid var(--acc);color:var(--txt);padding:9px 16px;border-radius:12px;
  font-size:13px;opacity:0;pointer-events:none;transition:all .25s;z-index:60;max-width:88%;text-align:center}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.cname{display:flex;justify-content:space-between;font-size:13px;margin-top:10px}
.clog{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--dim);background:#080d17;
  border:1px solid var(--line);border-radius:10px;padding:9px;margin-top:12px;min-height:64px;line-height:1.6}
.fightbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.fightbtns .btn{margin-top:0;min-height:56px}
.legend{position:absolute;top:8px;left:10px;font-size:11px;color:var(--dim);line-height:1.7;
  background:rgba(5,8,15,.7);padding:6px 9px;border-radius:10px;pointer-events:none}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
</style>
</head>
<body>
<div id="app">
  <div id="top">
    <span class="res">⬡ <b id="r-matter">0</b></span>
    <span class="res">✦ <b id="r-data">0</b></span>
    <span class="res">⌂ <b id="r-col">0/3</b></span>
    <button id="bobchip" data-act="tab:fleet">BOB-1</button>
    <button class="icobtn" data-act="help">?</button>
    <button class="icobtn" data-act="reset">⟲</button>
    <button class="icobtn" id="musicbtn" data-act="music">♫</button>
    <button class="icobtn" id="mutebtn" data-act="mute">♪</button>
  </div>
  <div id="main">
    <div class="view on" id="view-map">
      <canvas id="map"></canvas>
      <div class="legend">
        <span class="dot" style="background:#4be1c3"></span>your probes<br>
        <span class="dot" style="background:#6ee07a"></span>garden world<br>
        <span class="dot" style="background:#ff5d6c"></span>hostiles / The Others<br>
        <span class="dot" style="background:#39b4ff"></span>anomalous signal<br>
        <span class="dot" style="background:#3a4d6b"></span>uncharted
      </div>
      <div id="starcard"></div>
    </div>
    <div class="view" id="view-sys"></div>
    <div class="view" id="view-fleet"></div>
    <div class="view" id="view-tech"></div>
    <div class="view" id="view-log"></div>
  </div>
  <div id="tabs">
    <button class="tab on" data-act="tab:map"><span>✦</span>MAP</button>
    <button class="tab" data-act="tab:sys"><span>☉</span>SYSTEM</button>
    <button class="tab" data-act="tab:fleet"><span>⌬</span>FLEET</button>
    <button class="tab" data-act="tab:tech"><span>⚛</span>TECH</button>
    <button class="tab" data-act="tab:log"><span>≡</span>LOG</button>
  </div>
</div>
<div id="modal"><div id="modalbox"></div></div>
<div id="toast"></div>

<script>
'use strict';
/* ============ WE ARE LEGION v4 — an unofficial fan game inspired by
   Dennis E. Taylor's Bobiverse novels. Original code & text. ============ */

const $=s=>document.querySelector(s);
const SAVE_KEY='we-are-legion-v1';
const MAX_BOBS=16, AI_BOB_CAP=12, SIEGE_SECS=90, SOL_SIEGE_SECS=120;
const GAME_URL='https://timgunning-source.github.io/we-are-legion/';

/* ---------- difficulty ---------- */
const DIFFS={
 normal:{label:'Normal',sub:'the intended experience',wake:480,expand:90,expandMin:40,enemy:1,raid:0.15,score:1},
 hard:{label:'Hard',sub:'the Others are hungry',wake:360,expand:70,expandMin:32,enemy:1.25,raid:0.25,score:1.5},
 doom:{label:'We Are Doomed',sub:'GUPPI advises against this',wake:240,expand:55,expandMin:25,enemy:1.5,raid:0.35,score:2},
};
const D=()=>DIFFS[S.diff||'normal'];

/* ---------- enemy types ---------- */
const ETYPES={
 swarm:{n:'drone swarm',hull:1.1,dmg:0.85,hint:'railguns excel against it'},
 harvester:{n:'harvester',hull:1.45,dmg:0.8,hint:'plasma pierces its armour'},
 hunter:{n:'hunter-killer',hull:0.8,dmg:1.3,hint:'fast and vicious — hit it hard'},
};
const WMULT={
 swarm:{rail:1.5,plasma:0.6,buster:1},
 harvester:{rail:0.6,plasma:1.5,buster:1},
 hunter:{rail:1,plasma:1,buster:1},
};
const randEtype=()=>['swarm','swarm','harvester','hunter'][Math.floor(Math.random()*4)];

/* ---------- rng ---------- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
let rng=Math.random;
const ri=(a,b)=>a+Math.floor(rng()*(b-a+1));
const pick=arr=>arr[Math.floor(rng()*arr.length)];

/* ---------- static data ---------- */
const STAR_NAMES=["Alpha Centauri","Epsilon Eridani","Tau Ceti","Barnard's Star","Sirius","Procyon",
"61 Cygni","Epsilon Indi","Wolf 359","Ross 128","Luyten's Star","Lacaille 9352","Gliese 581",
"Kapteyn's Star","40 Eridani","Delta Pavonis","82 Eridani","Beta Hydri","Groombridge 34",
"Teegarden's Star","YZ Ceti","Kruger 60","Vega","Altair","Delta Eridani","Omicron Eridani",
"Gliese 667","Trappist-1","Van Maanen's Star","Ross 154","EZ Aquarii","Gliese 876",
"Arcturus","Capella","Pollux","Castor","Aldebaran","Rigel","Deneb","Spica","Antares","Mizar",
"Achernar","Canopus","Fomalhaut","Proxima"];
const BOB_NAMES=["Bill","Riker","Homer","Milo","Mario","Luke","Bender","Calvin","Goku","Garfield",
"Marvin","Hal","Ralph","Oliver","Hannibal","Loki","Thor","Linus","Icarus","Daedalus","Rocky",
"Ziggy","Sparky","Elmer","Herschel","Neil","Hungry","Dopey","Bashful","Tycho"];
const QUIRKS=[
 {txt:"renamed every drone after a famous physicist. They mine 25% faster for him.",fx:'miner'},
 {txt:"practices villain monologues. His weapons hit 20% harder.",fx:'fighter'},
 {txt:"is quietly convinced he's indestructible. +25 max hull.",fx:'tough'},
 {txt:"treats every jump like a race. 30% faster transits.",fx:'pilot'},
 {txt:"footnotes everything. +30% research data from his discoveries.",fx:'sci'},
 {txt:"is inexplicably lucky. +20% combat salvage.",fx:'lucky'},
 {txt:"flees at the first sign of trouble. His escapes always succeed.",fx:'coward'},
 {txt:"built a virtual beach office with infinite coffee.",fx:null},
 {txt:"hums elevator music over the fleet channel.",fx:null},
 {txt:"keeps a virtual cat named Schrödinger. Obviously.",fx:null},
 {txt:"is writing a 12-volume memoir nobody asked for.",fx:null},
];

const TECHS=[
 {k:'mining1',n:'Autofactory Drones',c:25,d:'+60% mining rate for every Bob.'},
 {k:'mining2',n:'Nanite Refineries',c:70,d:'+60% more mining.',req:'mining1'},
 {k:'drive1',n:'SURGE Drive Mk II',c:30,d:'+50% jump speed.'},
 {k:'drive2',n:'SURGE Drive Mk III',c:85,d:'Jump speed doubled again.',req:'drive1'},
 {k:'weap1',n:'Railgun Array',c:20,d:'+9 railgun damage per level.'},
 {k:'weap2',n:'Plasma Spike',c:60,d:'Unlocks the Plasma Spike attack.',req:'weap1'},
 {k:'weap3',n:'Nova Buster',c:140,d:'Unlocks a devastating once-per-battle strike.',req:'weap2'},
 {k:'hull1',n:'Ablative Plating',c:30,d:'+40 max hull for every Bob.'},
 {k:'hull2',n:'Adaptive Armor',c:90,d:'+80 more max hull.',req:'hull1'},
 {k:'suddar',n:'SUDDAR Long-Range',c:55,d:'Reveal intel on systems adjacent to your Bobs.'},
 {k:'terra',n:'Terraforming',c:200,d:'Convert marginal worlds into garden worlds (4000 ⬡, 180s).',req:'mining2'},
];

/* ---------- achievements ---------- */
const ACHS=[
 {k:'first_kill',n:'First Blood',d:'Destroy your first hostile'},
 {k:'col1',n:'Beachhead',d:'Establish a colony'},
 {k:'win',n:'Mission Complete',d:'Found three colonies'},
 {k:'contact',n:'The Song',d:'Meet the Whistlers'},
 {k:'ally',n:'Choir Ally',d:'Form the Whistler alliance'},
 {k:'legion8',n:'We Are Legion',d:'Reach a fleet of 8'},
 {k:'legion16',n:'We Are Many',d:'Reach the fleet cap of 16'},
 {k:'siege',n:'Hold the Line',d:'Break a siege'},
 {k:'vex',n:'Vexed No More',d:'Destroy VEX, the rogue probe'},
 {k:'hive',n:'Hive Breaker',d:'Destroy the Others\' Hive'},
 {k:'terra',n:'Gardener',d:'Terraform a world'},
 {k:'explorer',n:'Cartographer',d:'Chart every system'},
 {k:'doomwin',n:'Against All Odds',d:'Complete the mission on We Are Doomed'},
];
function ach(k){
  if(!S.ach)S.ach={};
  if(S.ach[k])return;
  S.ach[k]=S.t;
  const a=ACHS.find(x=>x.k===k);
  if(a){toast(`🏆 ${a.n}`);log(`🏆 Achievement: <b>${a.n}</b> — ${a.d}.`,'acc');sfx('win');}
  save();
}

/* ---------- state ---------- */
let S=null, C=null, modalFns={}, selectedStar=-1, curTab='map';

const ST=id=>S.stars[id];
const activeBob=()=>S.bobs.find(b=>b.id===S.active)||S.bobs[0];
const techLvl=p=>TECHS.filter(t=>t.k.startsWith(p)&&S.tech[t.k]).length;
const maxHull=b=>80+(S.tech.hull1?40:0)+(S.tech.hull2?80:0)+(b&&b.fx==='tough'?25:0);
const mineRate=(s,b)=>s.res<=0?0.5:+(s.rich*1.6*(1+0.6*techLvl('mining'))*(b&&b.fx==='miner'?1.25:1)).toFixed(1);
const reserveMax=s=>2500*s.rich;
const replCost=()=>Math.round(350*Math.pow(1.35,S.born-1));
const colonyCost=()=>Math.round([1500,3000,5000][Math.min(S.colonies,2)]*(S.diff==='doom'?1.5:1));
const defCost=s=>600*Math.pow(2,s.def);
const jumpSecs=(d,b)=>Math.max(4,Math.ceil(d*400/(6+3*techLvl('drive'))*(b&&b.fx==='pilot'?0.7:1)));
const dataGain=(b,d)=>Math.round(d*(b&&b.fx==='sci'?1.3:1));
const score=()=>Math.round((S.colonies*1000+S.stars.filter(s=>s.explored).length*40
  +S.bobs.length*120+(S.stats.kills||0)*150+Math.floor(S.data)*2
  +Object.keys(S.ach||{}).length*200+(S.hiveDead?3000:0))*D().score);

/* ---------- new game / galaxy gen ---------- */
function dailySeed(){
  const d=new Date();
  const s=`legion-${d.getUTCFullYear()}-${d.getUTCMonth()+1}-${d.getUTCDate()}`;
  let h=7;for(const c of s)h=Math.imul(h,31)+c.charCodeAt(0)|0;
  return h>>>0;
}
function dailyTagStr(){
  const d=new Date();
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
}
function newGame(diff,fixedSeed,dailyTag){
  const seed=fixedSeed!=null?fixedSeed:((Date.now()^(Math.random()*1e9))>>>0);
  rng=mulberry32(seed);
  const stars=[]; let guard=0;
  while(stars.length<38&&guard++<9000){
    const x=0.07+rng()*0.86, y=0.06+rng()*0.82;
    if(stars.every(s=>Math.hypot(s.x-x,s.y-y)>0.105)) stars.push({x,y});
  }
  let sol=0,best=9;
  stars.forEach((s,i)=>{const d=Math.hypot(s.x-0.5,s.y-0.90);if(d<best){best=d;sol=i}});
  const names=STAR_NAMES.slice(); for(let i=names.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[names[i],names[j]]=[names[j],names[i]]}
  stars.forEach((s,i)=>{s.id=i;s.name=i===sol?'Sol':names.pop();s.links=[];
    s.explored=false;s.scanned=false;s.colony=false;s.rich=ri(1,5);s.hab=0;s.host=0;
    s.oth=false;s.siege=null;s.invhp=0;s.def=0;s.etype=null;s.alien=false;s.res=0;s.hive=false;s.terra=null;});
  const addEdge=(a,b)=>{if(a!==b&&!stars[a].links.includes(b)){stars[a].links.push(b);stars[b].links.push(a)}};
  stars.forEach((s,i)=>{
    stars.map((o,j)=>({j,d:Math.hypot(o.x-s.x,o.y-s.y)})).filter(e=>e.j!==i)
      .sort((p,q)=>p.d-q.d).slice(0,3).forEach(e=>addEdge(i,e.j));
  });
  const comp=()=>{const c=stars.map(()=>-1);let n=0;
    stars.forEach((s,i)=>{if(c[i]<0){const q=[i];c[i]=n;
      while(q.length){const u=q.pop();stars[u].links.forEach(v=>{if(c[v]<0){c[v]=n;q.push(v)}})}n++}});
    return {c,n}};
  for(let it=0;it<60;it++){const {c,n}=comp();if(n===1)break;
    let bd=9,ba=0,bb=0;
    stars.forEach((s,i)=>stars.forEach((o,j)=>{if(c[i]!==c[j]){const d=Math.hypot(o.x-s.x,o.y-s.y);
      if(d<bd){bd=d;ba=i;bb=j}}}));
    addEdge(ba,bb);}
  const dist=stars.map(()=>99);dist[sol]=0;const q=[sol];
  while(q.length){const u=q.shift();stars[u].links.forEach(v=>{if(dist[v]>dist[u]+1){dist[v]=dist[u]+1;q.push(v)}})}
  const far=stars.filter(s=>s.id!==sol&&dist[s.id]>=2).sort(()=>rng()-0.5);
  far.slice(0,5).forEach(s=>s.hab=2);
  far.slice(5,13).forEach(s=>s.hab=1);
  stars.forEach(s=>{
    s.res=reserveMax(s);
    if(s.id===sol)return;
    let p=0.10+0.07*dist[s.id]+(s.hab===2?0.35:0);
    if(rng()<Math.min(0.75,p)){s.host=Math.min(3,1+Math.floor(dist[s.id]/3)+(s.hab===2?1:0));s.etype=randEtype();}
  });
  const solStar=stars[sol];
  solStar.explored=true;solStar.scanned=true;solStar.rich=2;solStar.hab=0;solStar.host=0;solStar.res=reserveMax(solStar);
  rng=Math.random;
  S={v:4,seed,diff:diff||'normal',stars,sol,bobs:[{id:1,name:'Bob',quirk:'the original. Probably.',fx:null,order:'manual',
      sys:sol,matter:150,hull:80,status:'idle',eta:0,etaT:0,from:sol,dest:sol}],
    active:1,born:1,nextId:2,data:0,tech:{},colonies:0,log:[],won:false,over:false,t:0,muted:false,music:true,

/* ---------- save / load / migrate ---------- */
function save(){try{S.lastSeen=Date.now();localStorage.setItem(SAVE_KEY,JSON.stringify(S))}catch(e){}}
function load(){try{const j=localStorage.getItem(SAVE_KEY);if(j){S=JSON.parse(j);migrate();return true}}catch(e){}return false}
function migrate(){
  if(!S.others)S.others={awake:false,t0:0,next:0};
  if(!S.lastSeen)S.lastSeen=Date.now();
  if(!S.diff)S.diff='normal';
  if(!S.story)S.story={w:0,next:Math.max(8,S.stars.filter(s=>s.explored).length+4),ally:false,target:-1};
  if(!S.stats)S.stats={kills:0};
  if(S.over===undefined)S.over=false;
  if(S.music===undefined)S.music=true;
  if(S.hiveKnown===undefined)S.hiveKnown=false;
  if(S.hiveDead===undefined)S.hiveDead=false;
  if(!S.ach)S.ach={};
  if(S.daily===undefined)S.daily=null;
  if(!S.rival)S.rival={lvl:1,escapes:0,dead:false,next:S.others.awake?S.t+120:0};
  if(!S.rival.dead&&S.rival.next===0&&S.others.awake)S.rival.next=S.t+200;
  S.bobs.forEach(b=>{if(!b.order)b.order='manual';if(b.fx===undefined)b.fx=null});
  S.stars.forEach(s=>{
    if(s.oth===undefined)s.oth=false;
    if(s.siege===undefined)s.siege=null;
    if(s.invhp===undefined)s.invhp=0;
    if(s.def===undefined)s.def=0;
    if(s.alien===undefined)s.alien=false;
    if(s.res===undefined)s.res=reserveMax(s);
    if(s.etype===undefined)s.etype=s.host>0?randEtype():null;
    if(s.hive===undefined)s.hive=false;
    if(s.terra===undefined)s.terra=null;
  });
  // older awake saves predate the Hive — anoint one
  if(S.others.awake&&!S.stars.some(s=>s.hive)){
    const cand=S.stars.filter(s=>s.oth);
    const h=cand.length?cand[cand.length-1]:S.stars.filter(s=>!s.colony&&s.id!==S.sol).pop();
    if(h){h.hive=true;h.oth=true;h.host=Math.max(h.host,5);if(!h.etype)h.etype='harvester';}
  }
  S.v=4;
}

/* ---------- audio ---------- */
let AC=null;
function sfx(kind){
  if(!S||S.muted)return;
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended')AC.resume();
    const play=(f,t0,dur,type,vol)=>{const o=AC.createOscillator(),g=AC.createGain();
      o.type=type||'sine';o.frequency.value=f;g.gain.value=0;
      g.gain.setValueAtTime(0,AC.currentTime+t0);
      g.gain.linearRampToValueAtTime(vol||0.06,AC.currentTime+t0+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+t0+dur);
      o.connect(g);g.connect(AC.destination);o.start(AC.currentTime+t0);o.stop(AC.currentTime+t0+dur+0.05);};
    if(kind==='tap')play(620,0,0.05,'sine',0.03);
    else if(kind==='ok'){play(520,0,0.08);play(780,0.07,0.12)}
    else if(kind==='bad'){play(220,0,0.18,'square',0.05);play(160,0.1,0.22,'square',0.05)}
    else if(kind==='jump'){play(880,0,0.3,'sine',0.04);play(440,0.1,0.35,'sine',0.04)}
    else if(kind==='hit'){play(140,0,0.12,'sawtooth',0.07)}
    else if(kind==='boom'){play(90,0,0.4,'sawtooth',0.09);play(60,0.05,0.5,'square',0.07)}
    else if(kind==='win'){[523,659,784,1047].forEach((f,i)=>play(f,i*0.12,0.25,'sine',0.05))}
    else if(kind==='dread'){[110,104,98].forEach((f,i)=>play(f,i*0.25,0.5,'sawtooth',0.05))}
    else if(kind==='song'){[392,523,659,523,392].forEach((f,i)=>play(f,i*0.16,0.3,'triangle',0.05))}
  }catch(e){}
}

/* ---------- generative ambient music ----------
   No audio files: an endless space soundtrack synthesized live.
   Calm mood = slow minor pads + sparse echoing melody.
   Dark mood (combat / sieges) = lower drone, dissonant chords, war pulse. */
let MU={on:false,int:null,step:0,ci:0,mood:'calm',g:null,fil:null,del:null,drones:[]};
const MUS_BASE=110;
const mhz=(r,s)=>MUS_BASE*Math.pow(2,(r+s)/12);
const PROG={
  calm:[{r:0,iv:[0,3,7,12,14]},{r:-4,iv:[0,4,7,12,16]},{r:-2,iv:[0,3,7,10,12]},{r:5,iv:[0,4,7,11,12]}],
  dark:[{r:0,iv:[0,3,6,12]},{r:-1,iv:[0,3,7,13]},{r:0,iv:[0,1,7,12]},{r:-5,iv:[0,3,6,10]}],
};
function musicMood(){
  if(!S)return 'calm';
  if(C||S.stars.some(s=>s.siege!=null))return 'dark';
  return 'calm';
}
function startMusic(){
  if(MU.on||!S||S.music===false)return;
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended')AC.resume();
    MU.g=AC.createGain();MU.g.gain.value=0;
    MU.fil=AC.createBiquadFilter();MU.fil.type='lowpass';MU.fil.frequency.value=900;MU.fil.Q.value=0.6;
    MU.del=AC.createDelay(1.2);MU.del.delayTime.value=0.45;
    const fb=AC.createGain();fb.gain.value=0.35;
    MU.del.connect(fb);fb.connect(MU.del);
    MU.fil.connect(MU.g);MU.del.connect(MU.g);
    MU.g.connect(AC.destination);
    MU.g.gain.setTargetAtTime(0.055,AC.currentTime,2);
    MU.drones=[0,0.7].map(det=>{
      const o=AC.createOscillator(),og=AC.createGain();
      o.type='sawtooth';o.frequency.value=mhz(0,-12)+det;og.gain.value=0.12;
      o.connect(og);og.connect(MU.fil);o.start();return o;
    });
    MU.step=0;MU.ci=0;MU.mood='calm';MU.on=true;
    MU.int=setInterval(musicStep,500);
  }catch(e){}
}
function stopMusic(){
  if(!MU.on)return;
  try{
    const g=MU.g,dr=MU.drones;
    g.gain.setTargetAtTime(0,AC.currentTime,0.8);
    setTimeout(()=>{try{dr.forEach(o=>o.stop());g.disconnect();}catch(e){}},3000);
    clearInterval(MU.int);
  }catch(e){}
  MU.on=false;MU.drones=[];
}
function mnote(f,t0,dur,vol,type,dest){
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type||'sine';o.frequency.value=f;
  g.gain.setValueAtTime(0,t0);
  g.gain.linearRampToValueAtTime(vol,t0+Math.min(1.5,dur*0.4));
  g.gain.setTargetAtTime(0,t0+dur*0.6,dur*0.25);
  o.connect(g);g.connect(dest||MU.fil);
  o.start(t0);o.stop(t0+dur*1.6);
}
function musicStep(){
  if(!MU.on||!AC)return;
  if(document.hidden)return;
  try{
    const t=AC.currentTime;
    const st=MU.step++;
    if(st%16===0){
      if(st%32===0)MU.mood=musicMood();
      const pool=PROG[MU.mood];
      MU.ci=(MU.ci+1)%pool.length;
      const ch=pool[MU.ci];
      const f=mhz(ch.r,MU.mood==='dark'?-24:-12);
      MU.drones.forEach((o,i)=>o.frequency.setTargetAtTime(f+i*0.7,t,1.5));
      ch.iv.slice(0,4).forEach((s,i)=>mnote(mhz(ch.r,s),t+i*0.15,7,0.05,'triangle'));
      MU.fil.frequency.setTargetAtTime(MU.mood==='dark'?500:900+Math.random()*500,t,2);
    }
    if(MU.mood==='dark'&&st%4===2)mnote(mhz(PROG.dark[MU.ci].r,-24),t,0.5,0.10,'sine');
    const mc=MU.mood==='dark'?0.10:0.18;
    if(Math.random()<mc){
      const ch=PROG[MU.mood][MU.ci];
      const s=ch.iv[Math.floor(Math.random()*ch.iv.length)]+12*(Math.random()<0.4?2:1);
      mnote(mhz(ch.r,s),t+0.05,2.5,0.05,'sine',MU.del);
    }
  }catch(e){}
}
document.addEventListener('visibilitychange',()=>{
  if(!MU.on||!MU.g||!AC)return;
  MU.g.gain.setTargetAtTime(document.hidden?0:0.055,AC.currentTime,0.5);
});

/* ---------- combat (manual) ---------- */
const weapLvl=()=>techLvl('weap');
const eHull=s=>Math.round((35+30*s.host)*ETYPES[s.etype||'swarm'].hull*D().enemy);
const eDmgFor=s=>Math.round((5+6*s.host)*ETYPES[s.etype||'swarm'].dmg*D().enemy)+Math.floor(Math.random()*7);
function startCombat(bob,star,ambush){
  if(!star.etype)star.etype=randEtype();
  const eh=eHull(star);
  // every idle Bob in the system answers the call — except lone deep-space intercepts
  const fleet=(star.transient&&!star.vex)?[bob]
    :[bob,...S.bobs.filter(x=>x.id!==bob.id&&x.sys===bob.sys&&x.status==='idle')];
  C={fleet,s:star,str:star.host,eh,em:eh,buster:true,lines:[]};
  C.lines.push(`Contact: ${star.vex?'VEX — rogue replicant':(star.oth?'Others ':'')+ETYPES[star.etype].n} (class ${star.host}). ${ETYPES[star.etype].hint}.`);
  if(fleet.length>1)C.lines.push(`${fleet.length} Bobs answer the call.`);
  if(ambush){
    const d=eDmgFor(star);bob.hull-=d;sfx('hit');
    C.lines.push(`They fire first. −${d} hull to ${bob.name}.`);
    if(bob.hull<=0){if(!fleetMemberDown(bob))return;}
  }
  renderCombat();
}
function pAttack(kind){
  const lead=C.fleet[0];
  const et=C.s.etype||'swarm';
  const w=weapLvl(),mult=WMULT[et][kind]||1;
  let d=0,txt='';
  if(kind==='rail'){d=12+9*w+Math.floor(Math.random()*7);txt='Railgun salvo'}
  else if(kind==='plasma'){d=16+14*w+Math.floor(Math.random()*17);txt='Plasma spike'}
  else if(kind==='buster'){d=70+Math.floor(Math.random()*26);C.buster=false;txt='NOVA BUSTER. The sky goes white'}
  d=Math.round(d*mult*(lead.fx==='fighter'?1.2:1));
  // wingmen fire their best basic weapon at 60% effect
  let sup=0;
  C.fleet.slice(1).forEach(x=>{
    const bd=(S.tech.weap2&&WMULT[et].plasma>=WMULT[et].rail)
      ?(16+14*w+8)*WMULT[et].plasma:(12+9*w+3)*WMULT[et].rail;
    sup+=Math.round(bd*0.6*(x.fx==='fighter'?1.2:1));
  });
  const total=d+sup;
  C.eh-=total;
  C.lines.push(`${txt}${sup>0?` (+${C.fleet.length-1} in support)`:''}: −${total}${mult>1?' (effective!)':mult<1?' (resisted)':''}.`);
  sfx('hit');
  if(C.eh<=0){victory();return;}
  if(C.s.vex&&!C.s.noEsc&&C.eh<0.3*C.em){vexEscape();return;}
  const tgt=C.fleet[Math.floor(Math.random()*C.fleet.length)];
  const e=eDmgFor(C.s);tgt.hull-=e;
  C.lines.push(`Return fire hits ${tgt.name}: −${e} hull.`);
  if(tgt.hull<=0){if(!fleetMemberDown(tgt))return;}
  renderCombat();shakeModal();
}
function combatRewards(bob,star,str){
  let m=120*str;if(bob.fx==='lucky')m=Math.round(m*1.2);
  const dd=dataGain(bob,8*str);
  bob.matter+=m;S.data+=dd;S.stats.kills++;ach('first_kill');
  if(!star.transient){
    if(star.oth)star.oth=false;
    star.host=0;star.etype=null;
  }
  return {m,dd};
}

/* ---------- combat (auto-resolved) ---------- */
function autoCombat(b,s){
  if(!s.etype)s.etype=randEtype();
  let eh=eHull(s),rounds=0,fled=false,buster=!!S.tech.weap3;
  const w=weapLvl(),et=s.etype;
  // AI picks its best available weapon vs this enemy type
  const best=()=>{
    const opts=[['rail',(12+9*w+3)*WMULT[et].rail]];
    if(S.tech.weap2)opts.push(['plasma',(16+14*w+8)*WMULT[et].plasma]);
    opts.sort((a,b2)=>b2[1]-a[1]);return opts[0];
  };
  while(b.hull>0&&eh>0&&rounds<30){
    rounds++;
    if(b.hull<0.4*maxHull(b)){
      if(Math.random()<(b.fx==='coward'?1:0.6)){fled=true;break}
    }else{
      let d;
      if(buster&&eh>60){d=70+Math.floor(Math.random()*26);buster=false}
      else{const [,avg]=best();d=Math.round(avg+(Math.random()*10-5));}
      if(b.fx==='fighter')d=Math.round(d*1.2);
      eh-=Math.max(1,d);
      if(eh<=0)break;
    }
    b.hull-=eDmgFor(s);
  }
  if(eh<=0){
    const r=combatRewards(b,s,s.host||1);
    log(`<b>${b.name}</b> auto-engaged and destroyed the ${ETYPES[et].n} ${s.transient?'near':'in'} ${s.name}. Salvage: +${r.m} ⬡, +${r.dd} ✦.`,'good');
    toast(`⚔ ${b.name} won at ${s.name}`);sfx('boom');
    if(s.hive)hiveWin();
  }else if(b.hull<=0){bobDownQuiet(b);}
  else if(fled){log(`${b.name} disengaged at ${s.name} — hull low, falling back.`);}
  save();
}

/* ---------- standing orders AI ---------- */
function bfsNext(start){
  const prev={};prev[start]=-1;const q=[start];
  while(q.length){
    const u=q.shift();
    for(const v of ST(u).links){
      if(v in prev)continue;
      const t=ST(v);
      if(!t.explored){
        if(hasIntel(t)&&t.host>0)continue;
        prev[v]=u;let x=v;while(prev[x]!==start)x=prev[x];return x;
      }
      if(t.host>0)continue;
      prev[v]=u;q.push(v);
    }
  }
  return null;
}
function aiTick(b){
  const s=ST(b.sys);
  if(s.host>0){
    if(b.order==='guard'){autoCombat(b,s);return;}
    if(b.hull>0.7*maxHull(b)&&weapLvl()>=s.host){autoCombat(b,s);return;}
    const safe=s.links.filter(id=>{const t=ST(id);return t.explored&&t.host===0});
    if(safe.length)doJumpBob(b,pick(safe),true);
    return;
  }
  if(!s.scanned){
    s.scanned=true;const d=dataGain(b,6+s.rich+Math.floor(Math.random()*5));S.data+=d;
    log(`${b.name} surveyed ${s.name}. +${d} ✦.`);
    return;
  }
  if(b.order==='guard')return;
  if(b.order==='expand'){
    if(S.bobs.length<AI_BOB_CAP&&b.matter>=replCost()){
      b.matter-=replCost();b.status='repl';b.eta=20;b.etaT=20;
      log(`<b>${b.name}</b> began printing a new matrix in ${s.name}.`);
      return;
    }
    if(s.res<=0){ // depleted — relocate to a live system
      const better=s.links.filter(id=>{const t=ST(id);return t.explored&&t.host===0&&t.res>0});
      if(better.length)doJumpBob(b,pick(better),true);
    }
    return;
  }
  if(b.order==='explore'){
    const next=bfsNext(b.sys);
    if(next!=null)doJumpBob(b,next,true);
    else{b.order='expand';log(`${b.name}: nothing left to chart from here — switching to EXPAND.`);}
  }
}

/* ---------- the others ---------- */
const othClass=()=>Math.min(4,2+Math.floor((S.t-S.others.t0)/600));
function wakeOthers(){
  const O=S.others;
  const dist=S.stars.map(()=>99);dist[S.sol]=0;const q=[S.sol];
  while(q.length){const u=q.shift();ST(u).links.forEach(v=>{if(dist[v]>dist[u]+1){dist[v]=dist[u]+1;q.push(v)}})}
  let home=null,bd=-1;
  S.stars.forEach(s=>{if(s.id!==S.sol&&!s.colony&&dist[s.id]>bd){bd=dist[s.id];home=s}});
  home.oth=true;home.host=5;home.hive=true;home.etype='harvester';
  O.awake=true;O.t0=S.t;O.next=S.t+D().expand;
  S.rival.next=S.t+180; // VEX smells blood
  sfx('dread');
  log(`<b>CONTACT.</b> A machine intelligence of unknown origin has begun strip-mining ${known(home)?home.name:'a distant system'}. GUPPI designates them: THE OTHERS.`,'bad');
  showModal('⛒ CONTACT — THE OTHERS',
   `Long-range SUDDAR lights up with something that should not exist: a harvesting swarm, system-wide, dismantling planets for raw matter. It is expanding. It does not respond to hails.<br><br>They will take this galaxy apart star by star — your colonies, and eventually <b>Sol itself</b>. If Sol falls, the mission is over.<br><br><span class="g">GUPPI: I've marked their territory in red. I suggest weapons research. Lots of it.</span>`,
   [{label:'Understood',cls:'bad'}],'bad');
}
function captureSystem(t,quiet){
  if(t.id===S.sol||t.colony){
    // siege: defenders get a window to respond
    t.oth=true;t.host=Math.max(t.host,othClass());t.etype=randEtype();
    t.siege=t.id===S.sol?SOL_SIEGE_SECS:SIEGE_SECS;
    t.invhp=100*t.host;
    sfx('dread');
    if(t.id===S.sol){
      log(`<b>⛒ THE OTHERS HAVE REACHED SOL.</b> The cradle of humanity falls in ${SOL_SIEGE_SECS}s unless the system is cleared.`,'bad');
      if(!quiet)toast('⛒ SOL IS UNDER ATTACK!');
    }else{
      log(`<b>⚠ ${t.name} IS UNDER ATTACK.</b> The colony falls in ${SIEGE_SECS}s unless the system is cleared.`,'bad');
      if(!quiet)toast(`⚠ COLONY UNDER ATTACK — ${t.name}!`);
    }
    return;
  }
  t.oth=true;t.host=Math.max(t.host,othClass());t.etype=randEtype();
  if(known(t)){
    log(`The Others have taken ${t.name}.`,'bad');
    if(!quiet)toast(`⛒ The Others took ${t.name}`);
  }
  if(S.bobs.some(b=>b.sys===t.id&&b.status!=='travel')&&!quiet){
    toast(`⚠ Hostile incursion at ${t.name}!`);sfx('bad');
  }
}
function othersTick(){
  const O=S.others;
  if(!O.awake){
    if(S.colonies>0||S.t>D().wake)wakeOthers();
    return;
  }
  if(!S.hiveDead&&S.t>=O.next){
    const frontier=[];
    S.stars.forEach(s=>{if(s.oth)s.links.forEach(id=>{const t=ST(id);
      if(!t.oth&&!frontier.includes(t))frontier.push(t)})});
    if(frontier.length){
      // they prefer to strike at colonies
      const cols=frontier.filter(t=>t.colony||t.id===S.sol);
      const target=(cols.length&&Math.random()<0.35)?cols[Math.floor(Math.random()*cols.length)]
        :frontier[Math.floor(Math.random()*frontier.length)];
      captureSystem(target);
    }
    const elapsed=S.t-O.t0;
    const interval=Math.max(D().expandMin,
      D().expand-5*Math.floor(elapsed/120)-6*S.colonies+(S.story.ally?14:0));
    O.next=S.t+interval;
  }
  // sieges
  S.stars.forEach(s=>{
    if(s.siege==null)return;
    if(s.host===0){
      s.siege=null;s.oth=false;ach('siege');
      log(`The siege of ${s.name} is broken. ${s.id===S.sol?'Sol holds.':'The colony holds.'}`,'good');
      toast(`⌂ ${s.name} saved!`);sfx('win');return;
    }
    // defense platforms fight back
    if(s.def>0){
      s.invhp-=8*s.def;
      if(s.invhp<=0){
        s.host=0;s.oth=false;s.siege=null;s.etype=null;ach('siege');
        log(`<b>${s.name}'s defense platforms repelled the assault.</b> Lv${s.def} grid holding.`,'good');
        toast(`🛡 ${s.name} defended itself!`);sfx('win');return;
      }
    }
    s.siege--;
    if(s.siege<=0){
      s.siege=null;
      if(s.id===S.sol){
        gameOver(`The Others reached Sol, and Sol could not hold. The last transmission from the cradle of humanity is the sound of the colony ships' engines, going nowhere.`);
        return;
      }
      s.colony=false;s.def=0;S.colonies=Math.max(0,S.colonies-1);
      sfx('dread');
      log(`<b>${s.name} has fallen.</b> The colony beacon goes dark. (${S.colonies}/3)`,'bad');
      showModal('⌂ COLONY LOST',
       `The last transmission from ${s.name} is a child asking why the sky is full of new stars. Then static.<br><br>The world itself survives — retake the system and you can rebuild.<br><br><span class="g">Colonies: ${S.colonies}/3</span>`,
       [{label:'They will pay for that',cls:'bad'}],'bad');
    }
  });
}

/* ---------- actions ---------- */
function doJumpBob(b,starId,silent){
  if(b.status!=='idle')return;
  const s=ST(b.sys),d=ST(starId);
  if(!s.links.includes(starId))return;
  const secs=jumpSecs(Math.hypot(d.x-s.x,d.y-s.y),b);
  b.status='travel';b.from=b.sys;b.dest=starId;b.eta=secs;b.etaT=secs;
  if(!silent){sfx('jump');log(`<b>${b.name}</b> jumping ${s.name} → ${d.name} (${secs}s).`);}
}
function doJump(starId){
  const b=activeBob();
  b.order='manual';
  doJumpBob(b,starId,false);
  $('#starcard').classList.remove('on');selectedStar=-1;
  refresh();save();
}
function arrive(b){
  b.status='idle';b.sys=b.dest;
  const s=ST(b.sys);
  const inter=b.order==='manual';
  if(!s.explored){
    s.explored=true;
    const d=dataGain(b,10+Math.floor(Math.random()*9));S.data+=d;
    sfx('ok');log(`<b>${b.name}</b> is first into <b>${s.name}</b>. +${d} ✦ survey data.`,'acc');
    if(S.stars.every(x=>x.explored))ach('explorer');
    if(s.hab===2){toast('🌍 Garden world detected!');log(`GUPPI: ${s.name} hosts a garden world. Colony candidate confirmed.`,'good');}
    if(!S.hiveKnown&&s.links.some(id=>ST(id).hive)){
      revealHive();
      showModal('⛒ SOMETHING VAST',
       `Long-range SUDDAR resolves the neighbouring system, and ${b.name} stops mid-thought.<br><br>It isn't a star system anymore. It is a machine the size of a star system — rings within rings, eating the corpse of a sun.<br><br><span class="g">GUPPI, very quietly: That's the heart of them. Kill that, and the war ends.</span>`,
       [{label:'Mark it: THE HIVE',cls:'bad'}],'bad');
    }
    if(s.host>0){
      if(inter){
        if(Math.random()<0.5){toast('⚠ AMBUSH!');startCombat(b,s,true);}
        else{toast(`⚠ Hostiles in ${s.name}`);sfx('bad');log(`${ETYPES[s.etype||'swarm'].n} detected in ${s.name} (class ${s.host}). Mining suspended.`,'bad');}
      }else{
        log(`${b.name} jumped into hostiles at ${s.name}.`,'bad');
        autoCombat(b,s);
      }
    }else if(inter&&b.id===S.active){
      if(S.story.w===2&&s.alien)fireContact(b,s);
      else if(storyDue())fireSong(b);
      else if(Math.random()<0.5)maybeEvent(b,s);
    }
  }else{
    if(inter)log(`${b.name} arrived at ${s.name}.`);
    if(s.host>0&&inter&&Math.random()<0.4){toast('⚠ Intercepted!');startCombat(b,s,true);}
    else if(inter&&s.host===0&&S.story.w===2&&s.alien)fireContact(b,s);
  }
  // hunter-killer raids near Others territory
  if(!C&&!S.over&&S.others.awake&&s.host===0&&!s.oth&&s.links.some(id=>ST(id).oth)&&Math.random()<D().raid){
    const cls=Math.min(4,2+Math.floor((S.t-S.others.t0)/900));
    const fake={name:s.name,host:cls,oth:true,transient:true,etype:'hunter'};
    if(inter){toast('⚠ HUNTER-KILLER INTERCEPT!');startCombat(b,fake,true);}
    else{log(`${b.name} was intercepted by a hunter-killer near ${s.name}!`,'bad');autoCombat(b,fake);}
  }
  refresh();save();
}
function doScan(){
  const b=activeBob(),s=ST(b.sys);
  if(s.scanned||b.status!=='idle'||s.host>0)return;
  s.scanned=true;const d=dataGain(b,6+s.rich+Math.floor(Math.random()*5));S.data+=d;
  sfx('ok');log(`Deep scan of ${s.name} complete. +${d} ✦.`);
  if(Math.random()<0.3)maybeEvent(b,s);
  refresh();save();
}
function doReplicate(){
  const b=activeBob(),s=ST(b.sys),cost=replCost();
  if(b.status!=='idle'||s.host>0||b.matter<cost||S.bobs.length>=MAX_BOBS)return;
  b.matter-=cost;b.status='repl';b.eta=20;b.etaT=20;
  log(`<b>${b.name}</b> began printing a new matrix in ${s.name} (−${cost} ⬡).`);
  toast('⌬ Replication started — 20s');
  refresh();save();
}
function doColony(){
  const b=activeBob(),s=ST(b.sys),cost=colonyCost();
  if(b.status!=='idle'||s.hab!==2||s.colony||s.host>0||!s.scanned||b.matter<cost)return;
  b.matter-=cost;s.colony=true;S.colonies++;
  sfx('win');ach('col1');
  log(`<b>COLONY ESTABLISHED at ${s.name}.</b> The beacon is lit. Colony ships are on their way. (${S.colonies}/3)`,'good');
  if(S.colonies>=3&&!S.won){
    S.won=true;ach('win');
    if(S.diff==='doom')ach('doomwin');
    showModal('🌍 MISSION COMPLETE',
     `Three beacons burn across the dark, and behind each one a world is waking up: landers, habitats, the first impossible green of Earth grass under an alien sun.<br><br>You were one man, once. Now you are a legion — and humanity's future is measured in galaxies.<br><br><span class="g">Score: ${score()} — ${D().label}<br>GUPPI: Mission parameters satisfied. The Others, however, remain. Shall we?</span>`,
     [{label:'📤 Share your score',cls:'dim',fn:()=>{shareScore();return 'keep'}},
      {label:'Keep going (endless mode)'}]);
  }else{
    showModal('⌂ COLONY ESTABLISHED',
     `${s.name} is officially humanity's newest home. GUPPI plays a fanfare he composed himself. It's... not bad.<br><br><span class="g">Colonies: ${S.colonies}/3 — guard it well. The next one will cost more.</span>`,
     [{label:'Continue'}]);
  }
  refresh();save();
}
function doTerra(){
  const b=activeBob(),s=ST(b.sys);
  if(b.status!=='idle'||s.hab!==1||!S.tech.terra||s.host>0||s.terra!=null||b.matter<4000)return;
  b.matter-=4000;s.terra=180;
  log(`<b>Terraforming begun at ${s.name}.</b> Atmosphere processors deploying — 180s.`,'acc');
  toast('🌱 Terraforming — 3 min');
  refresh();save();
}
function doDefense(){
  const b=activeBob(),s=ST(b.sys),cost=defCost(s);
  if(b.status!=='idle'||s.host>0||s.def>=3||b.matter<cost||!(s.colony||s.id===S.sol))return;
  b.matter-=cost;s.def++;
  sfx('ok');log(`Defense platform Lv${s.def} online at ${s.name}.`,'acc');toast(`🛡 ${s.name} — defenses Lv${s.def}`);
  refresh();save();
}
function buyTech(k){
  const t=TECHS.find(x=>x.k===k);
  if(!t||S.tech[k]||S.data<t.c||(t.req&&!S.tech[t.req]))return;
  S.data-=t.c;S.tech[k]=true;
  if(k==='hull1'||k==='hull2')S.bobs.forEach(b=>{b.hull=Math.min(maxHull(b),b.hull+(k==='hull1'?40:80))});
  sfx('ok');log(`Research complete: <b>${t.n}</b>.`,'acc');toast(`⚛ ${t.n}`);
  refresh();save();
}
function setOrder(id,o){
  const b=S.bobs.find(x=>x.id===id);if(!b)return;
  b.order=o;
  if(o!=='manual')log(`${b.name} acknowledged standing order: ${o.toUpperCase()}.`);
  refresh();save();
}

/* ---------- tick ---------- */
function tick(){
  if(!S||S.over)return;
  S.t++;
  for(const b of S.bobs.slice()){
    if(b.status==='travel'){b.eta--;if(b.eta<=0)arrive(b);}
    else if(b.status==='repl'){b.eta--;if(b.eta<=0){b.status='idle';spawnBob(b.sys);refresh();save();}}
    else{
      const s=ST(b.sys);
      if(s.host===0){
        const m=mineRate(s,b);
        if(s.res>0)s.res=Math.max(0,s.res-m);
        b.matter+=m;
      }
      // repairs cost matter now
      if(b.hull<maxHull(b)&&b.matter>=0.5){b.hull=Math.min(maxHull(b),b.hull+0.5);b.matter-=0.5;}
      if(b.order!=='manual'&&(S.t+b.id)%2===0)aiTick(b);
    }
  }
  othersTick();
  if(vexDue())vexAttack();
  S.stars.forEach(s=>{
    if(s.terra!=null&&s.host===0){
      s.terra--;
      if(s.terra<=0){s.terra=null;s.hab=2;ach('terra');
        log(`<b>Terraforming complete:</b> ${s.name} is now a garden world.`,'good');
        toast(`🌱 ${s.name} blooms`);sfx('win');}
    }
  });
  if(S.story.ally&&S.t%240===0)whistlerGift();
  if(S.t%10===0)save();
  renderTop();
  if(curTab==='sys')renderSystem();
  else if(curTab==='fleet')renderFleet();
}

/* ---------- offline progress ---------- */
function offlineCatchup(){
  if(S.over)return;
  const now=Date.now();
  const dt=Math.min(3600,Math.floor((now-(S.lastSeen||now))/1000));
  if(dt<90)return;
  let mined=0;const arrivals=[],newBobs=[];
  S.bobs.slice().forEach(b=>{
    const mineFor=(s,secs)=>{
      if(s.host>0||secs<=0)return 0;
      const rate=mineRate(s,b);
      let m;
      if(s.res>=rate*secs){m=rate*secs;s.res-=m;}
      else{const tFull=s.res/Math.max(rate,0.1);m=s.res+0.5*Math.max(0,secs-tFull);s.res=0;}
      b.matter+=m;return m;
    };
    if(b.status==='travel'){
      if(b.eta<=dt){
        const rem=dt-b.eta;
        b.status='idle';b.sys=b.dest;b.eta=0;
        const s=ST(b.sys);
        if(!s.explored){s.explored=true;S.data+=dataGain(b,12);arrivals.push(s.name);}
        mined+=mineFor(s,rem);
      }else b.eta-=dt;
    }else if(b.status==='repl'){
      if(b.eta<=dt){
        const rem=dt-b.eta;
        b.status='idle';b.eta=0;
        const nb=spawnBob(b.sys);newBobs.push(nb.name);
        mined+=mineFor(ST(b.sys),rem);
      }else b.eta-=dt;
    }else{
      mined+=mineFor(ST(b.sys),dt);
      b.hull=Math.min(maxHull(b),b.hull+0.25*dt);
    }
  });
  S.t+=dt;
  let captures=0;
  if(S.others.awake){
    const n=Math.min(2,Math.floor(dt/90));
    for(let i=0;i<n;i++){
      const frontier=[];
      S.stars.forEach(s=>{if(s.oth)s.links.forEach(id=>{const t=ST(id);
        if(!t.oth&&!frontier.includes(t))frontier.push(t)})});
      if(!frontier.length)break;
      // offline mercy: never start a Sol siege while you're away
      const safe_=frontier.filter(t=>t.id!==S.sol);
      if(!safe_.length)break;
      captureSystem(safe_[Math.floor(Math.random()*safe_.length)],true);
      captures++;
    }
  }
  const mins=Math.round(dt/60);
  let body=`<span class="g">GUPPI: Welcome back. You were frame-jacked out for ${mins} minute${mins===1?'':'s'}. Summary:</span><br><br>`;
  body+=`⬡ Fleet mining: <b>+${Math.floor(mined)}</b> matter<br>`;
  if(arrivals.length)body+=`✦ New systems charted: <b>${arrivals.join(', ')}</b><br>`;
  if(newBobs.length)body+=`⌬ Came online: <b>${newBobs.join(', ')}</b><br>`;
  if(captures>0)body+=`⛒ <b style="color:var(--bad)">The Others expanded — ${captures} system${captures>1?'s':''} lost.</b> Check the map.<br>`;
  body+=`<br>Everything is where you left it. Mostly.`;
  showModal('WHILE YOU WERE GONE',body,[{label:'Back to work'}]);
  log(`GUPPI: Offline report — +${Math.floor(mined)} ⬡ mined over ${mins} min.`);
  save();
}

/* ---------- intel helpers ---------- */
const known=s=>S.story.ally||s.explored||s.alien||(s.hive&&S.hiveKnown)||s.links.some(id=>ST(id).explored);
const hasIntel=s=>S.story.ally||s.explored||(s.hive&&S.hiveKnown)||(S.tech.suddar&&s.links.some(id=>S.bobs.some(b=>b.sys===id&&b.status!=='travel')));
function intelChips(s){
  if(!hasIntel(s)){
    return (s.alien?`<span class="chip blue">♫ anomalous signal</span>`:'')+`<span class="chip">intel: unknown</span>`;
  }
  const pct=Math.round(100*s.res/reserveMax(s));
  let h=s.res<=0?`<span class="chip warn">⬡ depleted</span>`
    :`<span class="chip">⬡ ${'▮'.repeat(s.rich)}${'▯'.repeat(5-s.rich)} ${pct}%</span>`;
  if(s.hab===2)h+=`<span class="chip good">🌍 garden world</span>`;
  else if(s.hab===1)h+=`<span class="chip warn">marginal world</span>`;
  if(s.colony)h+=`<span class="chip good">⌂ colony</span>`;
  if(s.def>0)h+=`<span class="chip acc">🛡 Lv${s.def}</span>`;
  if(s.alien)h+=`<span class="chip blue">♫ anomalous signal</span>`;
  if(s.terra!=null)h+=`<span class="chip acc">🌱 terraforming ${s.terra}s</span>`;
  if(s.siege!=null)h+=`<span class="chip bad">⚠ SIEGE — ${s.siege}s</span>`;
  if(s.hive&&S.hiveKnown)h+=`<span class="chip bad">⛒ THE HIVE ×${s.host}</span>`;
  else if(s.oth)h+=`<span class="chip bad">⛒ OTHERS ${ETYPES[s.etype||'swarm'].n} ×${s.host}</span>`;
  else if(s.host>0)h+=`<span class="chip bad">⚠ ${ETYPES[s.etype||'swarm'].n} ×${s.host}</span>`;
  else if(s.explored)h+=`<span class="chip acc">secure</span>`;
  return h;
}

function statusTxt(b){

  if(b.status==='travel')return ord+`in transit → ${ST(b.dest).name} (${b.eta}s)`;
  if(b.status==='repl')return ord+`replicating (${b.eta}s)`;
  const s=ST(b.sys);
  return ord+(s.host>0?'holding — hostiles present':`mining +${mineRate(s,b)} ⬡/s`);

function renderSystem(){
  const b=activeBob(),s=ST(b.sys);

  const oth=S.others.awake?` · <span style="color:var(--bad)">Others hold ${S.stars.filter(x=>x.oth).length} systems${S.hiveDead?' (leaderless)':''}</span>`:'';
  const earned=Object.keys(S.ach||{}).length;
  let h=`<div class="panel"><h2>≡ MISSION LOG${S.daily?` <span class="chip blue">🌌 Daily ${S.daily}</span>`:''}</h2><div class="sub">Score: <b style="color:var(--acc)">${score()}</b> (${D().label}) · Explored: ${S.stars.filter(x=>x.explored).length}/${S.stars.length} · Fleet: ${S.bobs.length} · Colonies: ${S.colonies}/3 · Kills: ${S.stats.kills}${oth}</div>
  <button class="btn dim" data-act="share" style="margin-top:10px">📤 Share score</button></div>
  <div class="panel"><h2>🏆 ACHIEVEMENTS — ${earned}/${ACHS.length}</h2>${ACHS.map(a=>{
    const got=!!(S.ach&&S.ach[a.k]);
    return `<div class="sub" style="padding:4px 0;${got?'color:var(--acc)':'opacity:.45'}">${got?'🏆':'◌'} <b>${a.n}</b> — ${a.d}</div>`;
  }).join('')}</div>`;
  S.log.forEach(l=>{h+=`<div class="logline ${l.c}">${l.m}</div>`});
  h+=`<button class="btn dim" data-act="reset" style="margin-top:16px">⟲ Abandon mission (new game)</button>
  <div class="sub" style="margin:14px 0 30px;text-align:center">An unofficial fan game inspired by the <i>Bobiverse</i> novels by Dennis E. Taylor.<br>Go read them — they're great.</div>`;
  $('#view-log').innerHTML=h;
}

/* ---------- map ---------- */
const cv=$('#map');const ctx=cv.getContext('2d');
let mapW=0,mapH=0,dust=[];
function fitCanvas(){
  const r=cv.parentElement.getBoundingClientRect();
  const dpr=window.devicePixelRatio||1;
  cv.width=r.width*dpr;cv.height=r.height*dpr;
  cv.style.width=r.width+'px';cv.style.height=r.height+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  mapW=r.width;mapH=r.height;
  dust=[];for(let i=0;i<90;i++)dust.push({x:Math.random()*mapW,y:Math.random()*mapH,r:Math.random()*1.1+0.2,a:Math.random()*0.5+0.1});
}
const PADX=24,PADTOP=24,PADBOT=38;
const sx=s=>PADX+s.x*(mapW-2*PADX);
const sy=s=>PADTOP+s.y*(mapH-PADTOP-PADBOT);
function drawMap(now){
  if(!S||!mapW){requestAnimationFrame(drawMap);return;}
  ctx.clearRect(0,0,mapW,mapH);
  ctx.fillStyle='#26344d';
  dust.forEach(d=>{ctx.globalAlpha=d.a;ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,7);ctx.fill()});
  ctx.globalAlpha=1;
  ctx.lineWidth=1;
  S.stars.forEach(s=>s.links.forEach(id=>{
    if(id<s.id)return;const o=ST(id);
    if(!known(s)||!known(o))return;
    ctx.strokeStyle=(s.explored&&o.explored)?'rgba(90,130,180,0.35)':'rgba(60,85,120,0.18)';
    ctx.beginPath();ctx.moveTo(sx(s),sy(s));ctx.lineTo(sx(o),sy(o));ctx.stroke();
  }));
  const pulse=0.5+0.5*Math.sin(now/400);
  S.stars.forEach(s=>{
    if(!known(s))return;
    const x=sx(s),y=sy(s);
    const intel=hasIntel(s);
    if(s.id===selectedStar){ctx.strokeStyle='rgba(75,225,195,0.9)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(x,y,13+pulse*2,0,7);ctx.stroke();}
    if(s.alien){ctx.strokeStyle=`rgba(57,180,255,${0.5+0.5*pulse})`;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(x,y,11+pulse*2,0,7);ctx.stroke();}
    if(intel&&s.oth){
      ctx.strokeStyle=`rgba(255,93,108,${0.45+0.45*pulse})`;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(x,y,10+pulse*1.5,0,7);ctx.stroke();
    }else if(intel&&s.host>0){
      ctx.strokeStyle=`rgba(255,93,108,${0.5+0.4*pulse})`;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(x,y,9,0,7);ctx.stroke();
    }
    if(intel&&s.hab===2){ctx.strokeStyle='rgba(110,224,122,0.9)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(x,y,6.5,0,7);ctx.stroke();}
    if(s.siege!=null&&pulse>0.5){ctx.strokeStyle='rgba(255,180,84,0.95)';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(x,y,14,0,7);ctx.stroke();}
    const isHive=s.hive&&S.hiveKnown;
    if(isHive&&!S.hiveDead){
      ctx.strokeStyle=`rgba(255,93,108,${0.3+0.4*pulse})`;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(x,y,16+pulse*3,0,7);ctx.stroke();
    }
    ctx.fillStyle=s.oth?'#ff5d6c':s.colony?'#6ee07a':s.explored?'#dfeefb':'#3a4d6b';
    ctx.beginPath();ctx.arc(x,y,isHive?6:(s.explored||s.oth?3.5:3),0,7);ctx.fill();
    if(s.explored||s.id===selectedStar||s.alien||isHive){
      ctx.fillStyle=isHive&&!S.hiveDead?'#ff5d6c':s.id===S.sol?'#9fb8d4':'rgba(140,165,195,0.85)';
      ctx.font='10px -apple-system,sans-serif';ctx.textAlign='center';
      ctx.fillText(isHive?'THE HIVE':s.name,x,y+(isHive?22:18));
    }
  });
  S.bobs.forEach(b=>{
    let x,y;
    if(b.status==='travel'){
      const f=ST(b.from),t=ST(b.dest),p=1-b.eta/b.etaT;
      x=sx(f)+(sx(t)-sx(f))*p;y=sy(f)+(sy(t)-sy(f))*p;
    }else{const s=ST(b.sys);x=sx(s);y=sy(s)-9;}
    const act=b.id===S.active;
    ctx.fillStyle=act?'#4be1c3':'rgba(75,225,195,0.55)';
    ctx.beginPath();ctx.moveTo(x,y-4.5);ctx.lineTo(x+3.5,y+3);ctx.lineTo(x-3.5,y+3);ctx.closePath();ctx.fill();
    if(act){ctx.strokeStyle=`rgba(75,225,195,${0.25+0.3*pulse})`;ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(x,y,8+pulse*2,0,7);ctx.stroke();}
  });
  requestAnimationFrame(drawMap);
}
cv.addEventListener('click',e=>{
  const r=cv.getBoundingClientRect();
  const px=e.clientX-r.left,py=e.clientY-r.top;
  let best=null,bd=26;
  S.stars.forEach(s=>{if(!known(s))return;
    const d=Math.hypot(sx(s)-px,sy(s)-py);if(d<bd){bd=d;best=s}});
  if(!best){$('#starcard').classList.remove('on');selectedStar=-1;return;}
  sfx('tap');selectedStar=best.id;showStarCard(best);
});
function showStarCard(s){
  const b=activeBob(),here=ST(b.sys);
  const linked=here.links.includes(s.id)&&b.status==='idle';
  const isHere=b.sys===s.id;
  let h=`<h2>${s.name}</h2>
  <div class="chips">${s.explored?'<span class="chip acc">explored</span>':'<span class="chip">uncharted</span>'}${intelChips(s)}</div>`;
  const bobsHere=S.bobs.filter(x=>x.sys===s.id&&x.status!=='travel').map(x=>x.name);
  if(bobsHere.length)h+=`<div class="sub">⌬ On station: ${bobsHere.join(', ')}</div>`;
  if(isHere)h+=`<button class="btn dim" data-act="tab:sys">Open system view</button>`;
  else if(linked){
    const secs=jumpSecs(Math.hypot(s.x-here.x,s.y-here.y),b);
    h+=`<button class="btn" data-act="jump:${s.id}">⟶ Jump ${b.name} here<span class="bsub">${secs}s via SURGE drive</span></button>`;
  }else h+=`<div class="sub" style="margin-top:6px">${b.status!=='idle'?b.name+' is busy.':'Not linked to '+b.name+'’s current system — plot a route through connected stars.'}</div>`;
  const card=$('#starcard');card.innerHTML=h;card.classList.add('on');
}

/* ---------- intro & help ---------- */
function intro(){
  const diffBtns=Object.keys(DIFFS).map(k=>({
    label:'Launch — '+DIFFS[k].label,sub:DIFFS[k].sub,cls:k==='doom'?'bad':k==='hard'?'dim':'',
    fn:()=>{S.diff=k;save();help();return 'keep'}
  }));
  diffBtns.push({label:'🌌 Daily Challenge',sub:"today's galaxy — identical for everyone, on Hard",cls:'blue',
    fn:()=>{newGame('hard',dailySeed(),dailyTagStr());setTab('map');help();return 'keep'}});
  showModal('WE ARE LEGION',
   `<span class="g">// 2133. Earth is dying.</span><br><br>
   You were <b>Robert Johansson</b> — engineer, sci-fi nerd, recently deceased. You woke up 117 years later as the uploaded mind of a <b>self-replicating Von Neumann probe</b>, flung into the dark with one job:<br><br>
   <b>Find humanity a new home.</b> Three garden worlds, secured and beaconed, before the colony ships run out of time.<br><br>
   And Bob — something out there eats stars. If it reaches Sol, everything ends.<br><br>
   <span class="g">GUPPI: May I suggest we begin by not dying, sir?</span>`,
   diffBtns);
}
function help(){
  showModal('GUPPI BRIEFING',
   `<b>☉ Mine</b> — idle Bobs mine ⬡ automatically, but systems <b>deplete</b>. Repairs cost ⬡ too. Keep the frontier moving.<br><br>
   <b>✦ Explore</b> — tap stars, jump to linked systems. First visits and scans earn ✦ for research.<br><br>
   <b>⌬ Replicate</b> — print new Bobs. Replicative drift gives some of them real bonuses.<br><br>
   <b>⚙ Standing orders</b> — in FLEET, set Bobs to EXPLORE / EXPAND / GUARD and they act on their own.<br><br>
   <b>⚔ Know your enemy</b> — railguns shred <b>drone swarms</b>, plasma pierces <b>harvesters</b>, and <b>hunter-killers</b> just hit hard. Watch the ▲▼ hints.<br><br>
   <b>⛒ The Others</b> — they expand forever and accelerate as you grow. They besiege colonies — and <b>if Sol falls, you lose</b>. Build 🛡 defense platforms at colonies and Sol. Somewhere out there is their <b>HIVE</b> — find it, gather your Bobs in one system, and destroy it to end the war for good. Bobs in the same system <b>fight as a fleet</b>.<br><br>
   <b>♫ And something else is out there.</b> Listen for it. (Something nastier is out there too. He has a name.)<br><br>
   <b>⌂ Win</b> — colonies on 3 🌍 garden worlds. Restart anytime with ⟲.<br><br>
   <span class="g">♫ toggles the ambient soundtrack (it darkens when things go wrong — listen). ♪ toggles sound effects. Autosaves on this device; the fleet keeps working up to an hour while you're away. GUPPI out.</span>`,
   [{label:'Understood'}]);
}

/* ---------- input delegation ---------- */
// music needs a user gesture on iOS — the very first tap anywhere starts it
document.addEventListener('click',()=>{if(S&&S.music&&!MU.on)startMusic();},true);
document.addEventListener('click',e=>{
  const el=e.target.closest('[data-act]');
  if(!el)return;
  const act=el.dataset.act;
  if(modalFns[act]){sfx('tap');const r=modalFns[act]();if(r!=='keep')closeModal();return;}
  const i=act.indexOf(':');
  const k=i<0?act:act.slice(0,i), v=i<0?'':act.slice(i+1);
  if(k!=='tab')sfx('tap');
  switch(k){
    case 'tab':setTab(v);break;
    case 'help':help();break;
    case 'mute':S.muted=!S.muted;renderTop();save();break;
    case 'music':S.music=!S.music;if(S.music)startMusic();else stopMusic();renderTop();save();break;
    case 'share':shareScore();break;
    case 'jump':doJump(+v);break;
    case 'bob':S.active=+v;toast('Direct control: '+activeBob().name);refresh();save();break;
    case 'ord':{const [id,o]=v.split(':');setOrder(+id,o);break;}
    case 'scan':doScan();break;
    case 'repl':doReplicate();break;
    case 'colony':doColony();break;
    case 'terra':doTerra();break;
    case 'defense':doDefense();break;
    case 'engage':{const b=activeBob(),s=ST(b.sys);if(s.host>0&&b.status==='idle')startCombat(b,s,false);break;}
    case 'buy':buyTech(v);break;
    case 'reset':
      showModal('⟲ START A NEW GAME?','All Bobs, colonies and research will be lost to the void. A fresh probe launches into a freshly generated, bigger galaxy — you pick the difficulty.',
       [{label:'Yes — start over',cls:'bad',fn:()=>{localStorage.removeItem(SAVE_KEY);newGame();setTab('map');intro();return 'keep';}},
        {label:'No — keep going',cls:'dim'}]);
      break;
  }
});
$('#modal').addEventListener('click',e=>{if(e.target.id==='modal'&&!C)closeModal();});
window.addEventListener('resize',fitCanvas);

/* ---------- boot ---------- */
if('serviceWorker' in navigator){try{navigator.serviceWorker.register('sw.js').catch(()=>{})}catch(e){}}
const hadSave=load();
if(!hadSave)newGame();
fitCanvas();
renderTop();
requestAnimationFrame(drawMap);
setInterval(tick,1000);
if(!hadSave)intro();
else if(S.over)gameOver('The previous timeline ended here.');
else{toast('Save loaded — welcome back, '+activeBob().name);offlineCatchup();}
</script>
